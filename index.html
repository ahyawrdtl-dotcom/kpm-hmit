<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPM HMIT</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top right, #1e1b4b, #0f172a, #020617);
      color: white;
      overflow: hidden;
      height: 100vh;
    }

    /* Animated Background Mesh */
    .bg-mesh {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      background:
        radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.15), transparent 25%);
      animation: backgroundMove 20s infinite alternate;
    }

    @keyframes backgroundMove {
      0% {
        transform: scale(1);
      }

      100% {
        transform: scale(1.1);
      }
    }

    /* ================= LOADING SCREEN ================= */
    #loadingScreen {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #020617;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 999;
      transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), visibility 1s;
    }

    .logo {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 4px;
      background: linear-gradient(to right, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeIn 2s ease forwards, pulseLogo 2s infinite alternate;
      text-shadow: 0 0 20px rgba(129, 140, 248, 0.3);
    }

    .loadingText {
      margin-top: 15px;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #94a3b8;
      animation: blink 1.5s infinite ease-in-out;
    }

    @keyframes pulseLogo {
      0% {
        filter: drop-shadow(0 0 10px rgba(129, 140, 248, 0.2));
      }

      100% {
        filter: drop-shadow(0 0 25px rgba(192, 132, 252, 0.5));
      }
    }

    /* ================= MAIN CONTENT ================= */
    #mainContent {
      opacity: 0;
      visibility: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1) 0.5s;
    }

    .header-title {
      margin-bottom: 50px;
      text-align: center;
      opacity: 0;
      transform: translateY(-20px);
      animation: slideDown 1s ease forwards 1s;
    }

    .header-title h1 {
      font-size: 42px;
      font-weight: 800;
      margin: 0;
      background: linear-gradient(135deg, #f8fafc 0%, #cbd5e1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-title p {
      color: #94a3b8;
      font-size: 16px;
      margin-top: 8px;
      letter-spacing: 1px;
    }

    .container {
      display: flex;
      gap: 50px;
      perspective: 1000px;
    }

    /* CARD */
    .card {
      width: 280px;
      height: 400px;
      border-radius: 24px;
      padding: 30px;
      position: relative;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
      overflow: hidden;

      /* Glassmorphism */
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);

      /* Initial Entry Animation */
      opacity: 0;
      transform: translateY(40px) rotateX(10deg);
      animation: cardEnter 0.8s ease forwards 1.2s;
    }

    .card:nth-child(2) {
      animation-delay: 1.4s;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 100%);
      z-index: 0;
      transition: 0.5s;
    }

    .card:hover {
      transform: translateY(-15px) scale(1.03) rotateX(0);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .card.blue:hover {
      box-shadow: 0 20px 40px rgba(14, 165, 233, 0.2), inset 0 0 20px rgba(14, 165, 233, 0.1);
      border-color: rgba(14, 165, 233, 0.4);
    }

    .card.purple:hover {
      box-shadow: 0 20px 40px rgba(124, 58, 237, 0.2), inset 0 0 20px rgba(124, 58, 237, 0.1);
      border-color: rgba(124, 58, 237, 0.4);
    }

    .card>* {
      position: relative;
      z-index: 1;
    }

    .number {
      font-size: 72px;
      font-weight: 800;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.05) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 20px;
      transition: 0.4s;
    }

    .card:hover .number {
      transform: scale(1.1) translateX(10px);
    }

    .title {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .label {
      position: absolute;
      bottom: 30px;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 8px 16px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: 0.4s;
    }

    .card:hover .label {
      background: white;
      color: black;
      box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
    }

    .card img {
      width: 220px;
      position: absolute;
      right: -30px;
      top: 100px;
      transform: rotate(-15deg);
      pointer-events: none;
      transition: 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
      filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.5));
    }

    .card:hover img {
      transform: rotate(-5deg) scale(1.15) translateY(-10px);
      filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.6));
    }

    /* ANIMATIONS */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(60px) rotateX(15deg);
      }

      to {
        opacity: 1;
        transform: translateY(0) rotateX(0);
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 0.3;
      }

      50% {
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <div class="bg-mesh"></div>

  <!-- LOADING -->
  <div id="loadingScreen">
    <div class="logo">WELCOME KATHARSIS</div>
    <div class="loadingText">Loading System...</div>
  </div>

  <!-- MAIN -->
  <div id="mainContent">
    <div class="header-title">
      <h1>Portal KPM</h1>
      <p>Pilih role Anda untuk melanjutkan</p>
    </div>

    <div class="container">

      <!-- SEKRETARIS -->
      <div class="card blue" onclick="sekretaris()">
        <div class="number">01</div>
        <div class="title">SEKRETARIS</div>
        <img src="https://cdn-icons-png.flaticon.com/512/2922/2922561.png" alt="Sekretaris Icon">
        <div class="label">Coming Soon</div>
      </div>

      <!-- BENDAHARA -->
      <div class="card purple" onclick="bendahara()">
        <div class="number">02</div>
        <div class="title">BENDAHARA</div>
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135706.png" alt="Bendahara Icon">
        <div class="label">Masuk</div>
      </div>

    </div>
  </div>

  <script>
    // LOADING → MASUK MENU
    window.onload = function () {
      setTimeout(() => {
        const loadingScreen = document.getElementById("loadingScreen");
        const mainContent = document.getElementById("mainContent");

        loadingScreen.style.opacity = "0";

        setTimeout(() => {
          loadingScreen.style.visibility = "hidden";
          mainContent.style.opacity = "1";
          mainContent.style.visibility = "visible";
        }, 1000);

      }, 2500); // durasi loading
    }

    // BUTTON
    function sekretaris() {
      alert("Fitur Sekretaris belum tersedia 😄");
    }

    function bendahara() {
      // Add a smooth exit animation before redirecting
      document.getElementById("mainContent").style.opacity = "0";
      setTimeout(() => {
        window.location.href = "bendahara.html";
      }, 500);
    }
  </script>

</body>

</html>
